# Port API Documentation App - Docker Compose Configuration
# Use this for local development and testing

version: '3.8'

services:
  api-docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: port-api-docs
    ports:
      - "3000:3000"
    environment:
      # Port API Authentication (required)
      - PORT_CLIENT_ID=${PORT_CLIENT_ID}
      - PORT_CLIENT_SECRET=${PORT_CLIENT_SECRET}
      # Alternative: Use API token directly
      # - PORT_API_TOKEN=${PORT_API_TOKEN}
      
      # Port Configuration
      - PORT_API_REGION=${PORT_API_REGION:-us}
      
      # iFrame Security
      - ALLOWED_IFRAME_ORIGINS=${ALLOWED_IFRAME_ORIGINS:-https://app.getport.io}
      
      # Node settings
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

